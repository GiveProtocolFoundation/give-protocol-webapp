    <!-- Google tag (gtag.js) - wrapped to handle ad-blockers gracefully -->
    <script>
      (function () {
        try {
          var s = document.createElement("script");
          s.async = true;
          s.src = "https://www.googletagmanager.com/gtag/js?id=G-CBQHKLHD8T";
          s.onerror = function () {
            console.info(
              "GTM blocked (ad-blocker or network issue) — analytics disabled",
            );
          };
          document.head.appendChild(s);
        } catch (e) {
          // Silently ignore GTM load failures
        }
      })();
    </script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }

      // Set default consent to denied
      gtag("consent", "default", {
        analytics_storage: "denied",
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        wait_for_update: 500,
      });

      gtag("js", new Date());
      gtag("config", "G-CBQHKLHD8T");
    </script>

    <!-- Silktide Configuration -->
    <script>
      // Wait for Silktide to load before configuring
      if (typeof silktideCookieBannerManager !== "undefined") {
        silktideCookieBannerManager.updateCookieBannerConfig({
          background: {
            showBackground: false,
          },
          cookieIcon: {
            position: "bottomLeft",
          },
          cookieTypes: [
            {
              id: "necessary",

              description:
                "<p>These cookies help us improve the site by tracking which pages are most popular and how visitors move around the site.</p>",
              defaultValue: true,
              onAccept: function () {
                gtag("consent", "update", {
                  analytics_storage: "granted",
                });
                dataLayer.push({
                  event: "consent_accepted_analytics",
                });
              },
              onReject: function () {
                gtag("consent", "update", {
                  analytics_storage: "denied",
                });
              },
            },
            {
              id: "advertising",
              name: "Advertising",
              description:
                "<p>These cookies provide extra features and personalization to improve your experience. They may be set by us or by partners whose services we use.</p>",
              onAccept: function () {
                gtag("consent", "update", {
                  ad_storage: "granted",
                  ad_user_data: "granted",
                  ad_personalization: "granted",
                });
                dataLayer.push({
                  event: "consent_accepted_advertising",
                });
              },
              onReject: function () {
                gtag("consent", "update", {
                  ad_storage: "denied",
                  ad_user_data: "denied",
                  ad_personalization: "denied",
                });
              },
            },
          ],
          text: {
            banner: {

              acceptAllButtonText: "Accept all",
              acceptAllButtonAccessibleLabel: "Accept all cookies",

            banner: "bottomCenter",
          },
        });
      } else {
        console.warn(
          "Silktide consent manager not loaded. Please ensure the JS file is available.",
        );
      }
    </script>
