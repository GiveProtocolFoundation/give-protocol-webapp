[build]
  command = "npm run build:spa"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # CSP HTTP header — mirrors canonical meta tag in index.html.
    # Validated by scripts/validate-csp.mjs.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'sha256-FE0b/aIu3qmhPRVUXn/+TXDCpLi5oRzW6cwcyknX2PU=' https://etqbojasfmpieigeefdj.supabase.co https://*.sentry.io https://translate.google.com https://translate.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com https://secure.helcim.app https://api.helcim.com https://www.paypal.com https://www.paypalobjects.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws://localhost:* https://etqbojasfmpieigeefdj.supabase.co https://*.sentry.io wss://*.supabase.co https://api.giveprotocol.io https://translate.googleapis.com https://www.google-analytics.com https://analytics.google.com https://api.coingecko.com https://secure.helcim.app https://api.helcim.com https://www.paypal.com https://api-m.paypal.com https://api-m.sandbox.paypal.com https://mainnet.base.org https://base.publicnode.com https://mainnet.optimism.io https://rpc.api.moonbeam.network https://sepolia.base.org https://sepolia.optimism.io https://rpc.api.moonbase.moonbeam.network https://s3.amazonaws.com; frame-src 'self' https://translate.google.com https://secure.helcim.app https://api.helcim.com https://www.paypal.com https://www.sandbox.paypal.com; object-src 'none'; base-uri 'self'; form-action 'self';"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
