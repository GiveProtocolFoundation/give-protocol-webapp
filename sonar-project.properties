# SonarCloud Project Configuration for Give Protocol Web App

# SonarCloud server configuration
sonar.host.url=https://sonarcloud.io
sonar.organization=giveprotocol3475084257

# Project identification
sonar.projectKey=GiveProtocol_give-protocol-webapp
sonar.projectName=Give Protocol Web App
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,src/test/**/*
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/artifacts/**,**/coverage/**,**/*.min.js,**/vendor/**,docs/**

# JavaScript/TypeScript settings
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# Test coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ESLint reports (disabled until report generation is configured)
# sonar.eslint.reportPaths=eslint-report.json

# Language settings
sonar.sourceEncoding=UTF-8

# Analysis scope — coverage exclusions
# Only exclude test infrastructure, config, types, and generated files.
# Source code (components, pages, hooks, utils) should be covered.
sonar.coverage.exclusions=**/*.test.js,**/*.test.ts,**/*.test.tsx,**/*.spec.js,**/*.spec.ts,**/test/**,**/tests/**,**/cypress/**,**/scripts/**,src/test-utils/**,src/mocks/**,**/__tests__/**,**/__mocks__/**,src/config/**,src/types/**,src/lib/**,src/styles/**,src/main.tsx,src/entry-server.tsx

# Duplication exclusions (for similar React component patterns)
sonar.cpd.exclusions=**/src/pages/charities/**/*.tsx,**/src/pages/portfolio/**/*.tsx,**/src/pages/causes/**/*.tsx,**/src/components/auth/**/*.tsx,**/src/contracts/**/*.json,**/src/i18n/resources/**,**/src/pages/admin/**/*.tsx
sonar.cpd.minimum.lines=20
sonar.cpd.minimum.tokens=150

# Issue exclusions (reduce strict checking for development)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1481
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.ts,**/*.tsx
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S1481
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.js,**/*.jsx
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S6676
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.ts,**/*.tsx
sonar.issue.ignore.multicriteria.e4.ruleKey=javascript:UnusedVariable
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S2004
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.tsx

# Quality gate — disabled until SONAR_TOKEN is regenerated with Browse+ExecuteAnalysis
# permissions (GIV-231). Re-enable once token is updated in GitHub secrets.
sonar.qualitygate.wait=false